<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TEGENS — Rainbet Code (text only)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Rubik:ital,wght@0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
<style>
  :root{ --blue:#2f86ff; --blue2:#5aa3ff; --gold:#ffce4f; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:transparent; font-family:'Rubik',sans-serif; }
  .stage{ width:1232px; height:470px; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }

  .h1{ font-family:'Chakra Petch',sans-serif; font-weight:700; text-transform:uppercase; line-height:.82; letter-spacing:.01em; }
  .h1 .row{ display:block; }
  .row1{ font-size:118px; }
  .row2{ font-size:172px; margin-top:4px; }
  .gradb{ background:linear-gradient(180deg,#dfeeff 0%, #66a9ff 46%, #1f6feb 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 0 #0a1834) drop-shadow(0 7px 16px rgba(0,0,0,.5)) drop-shadow(0 0 30px rgba(47,134,255,.5)); }
  .silv{ background:linear-gradient(180deg,#ffffff 0%, #cdd9ec 60%, #9fb1cc 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 0 #1a2740) drop-shadow(0 7px 16px rgba(0,0,0,.5)); }
  .goldg{ background:linear-gradient(180deg,#ffe89a 0%, #ffce4f 45%, #f3a51a 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 0 #3a2a05) drop-shadow(0 7px 16px rgba(0,0,0,.5)) drop-shadow(0 0 30px rgba(255,170,40,.45)); }

  .sub{ margin-top:20px; font-style:italic; font-weight:900; font-size:27px; letter-spacing:.01em;
    text-transform:uppercase; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.75); white-space:nowrap; }
  .sub .bar{ color:var(--blue2); font-style:normal; margin:0 14px; font-weight:700; }

  .foot{ margin-top:22px; display:flex; align-items:center; justify-content:center; gap:24px; }
  .foot .rblogo{ height:46px; width:auto; filter:drop-shadow(0 3px 14px rgba(47,134,255,.55)); }
  .arrows{ display:flex; align-items:center; gap:5px; }
  .arrows i{ width:0; height:0; border-left:22px solid var(--blue2); border-top:14px solid transparent; border-bottom:14px solid transparent; filter:drop-shadow(0 0 10px rgba(47,134,255,.6)); }
  .code{ font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:48px; letter-spacing:.01em; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.7); }
  .code b{ color:var(--gold); }
</style>
</head>
<body>
  <div class="stage" data-screen-label="Rainbet Code Text">
    <div class="h1">
      <span class="row row1"><span class="gradb">RAINBET</span> <span class="silv">CODE</span></span>
      <span class="row row2 goldg">TEGENS</span>
    </div>
    <div class="sub">3.5% RAKEBACK &middot; RANK-UP REWARDS <span class="bar">|</span> $10 BACK FOR EVERY $10,000 WAGERED</div>
    <div class="foot">
      <img class="rblogo" src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/rainbet_logo.webp" alt="Rainbet" />
      <span class="arrows"><i></i><i></i><i></i></span>
      <span class="code">CODE: <b>TEGENS</b></span>
    </div>
  </div>
</body>
</html>
