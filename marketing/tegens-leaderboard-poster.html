<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TEGENS — Leaderboard Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Rubik:ital,wght@0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue:#2f86ff; --blue2:#5aa3ff;
    --gold:#ffce4f; --gold2:#f7a317;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:transparent; font-family:'Rubik',sans-serif; }
  .stage{ position:relative; width:1232px; height:819px; overflow:hidden; }

  /* blue glow orbs behind the mascot */
  .glow{ position:absolute; z-index:0; border-radius:50%; filter:blur(2px);
    background:radial-gradient(circle, rgba(140,205,255,.62), rgba(47,134,255,.18) 46%, transparent 70%); }
  .glow.l{ width:340px; height:340px; left:5%; top:230px; }
  .glow.r{ width:360px; height:360px; right:4%; top:250px; }

  /* scattered coin / reward symbols */
  .sym{ position:absolute; z-index:1; filter:drop-shadow(0 10px 20px rgba(0,0,0,.45)); }
  .s-gold{ width:140px; left:210px; top:300px; transform:rotate(-12deg); }
  .s-silver{ width:124px; right:215px; top:332px; transform:rotate(13deg); }
  .s-bronze{ width:98px; left:312px; top:452px; transform:rotate(9deg); }
  .s-coin{ width:88px; right:312px; top:150px; transform:rotate(-12deg); }
  .s-three{ width:158px; right:118px; top:452px; transform:rotate(10deg); z-index:3; }
  .s-gift{ width:120px; left:120px; top:404px; transform:rotate(-8deg); z-index:3; }

  /* Rainbet raccoon mascot */
  .raccoon{ position:absolute; z-index:2; left:50%; transform:translateX(-50%); top:0; height:470px; width:auto;
    filter:drop-shadow(0 18px 40px rgba(0,0,0,.55)); }

  .content{ position:absolute; z-index:4; left:0; right:0; bottom:26px;
    display:flex; flex-direction:column; align-items:center; text-align:center; }

  .h1{ font-family:'Chakra Petch',sans-serif; font-weight:700; text-transform:uppercase; line-height:.82; letter-spacing:.005em; }
  .h1 .row{ display:block; }
  .row1{ font-size:132px; }
  .row2{ font-size:148px; margin-top:2px; }
  .gradb{ background:linear-gradient(180deg,#dfeeff 0%, #66a9ff 46%, #1f6feb 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 0 #0a1834) drop-shadow(0 7px 16px rgba(0,0,0,.5)) drop-shadow(0 0 30px rgba(47,134,255,.5)); }
  .silv{ background:linear-gradient(180deg,#ffffff 0%, #cdd9ec 60%, #9fb1cc 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 0 #1a2740) drop-shadow(0 7px 16px rgba(0,0,0,.5)); }

  .sub{ margin-top:18px; font-style:italic; font-weight:900; font-size:27px; letter-spacing:.01em;
    text-transform:uppercase; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.75); white-space:nowrap; }
  .sub .bar{ color:var(--blue2); font-style:normal; margin:0 14px; font-weight:700; }

  .foot{ margin-top:20px; display:flex; align-items:center; justify-content:center; gap:24px; }
  .foot .flogo{ height:62px; width:auto; filter:drop-shadow(0 3px 14px rgba(47,134,255,.55)); }
  .arrows{ display:flex; align-items:center; gap:5px; }
  .arrows i{ width:0; height:0; border-left:22px solid var(--blue2); border-top:14px solid transparent; border-bottom:14px solid transparent; filter:drop-shadow(0 0 10px rgba(47,134,255,.6)); }
  .code{ font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:48px; letter-spacing:.01em; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.7); }
  .code b{ color:var(--blue2); }
</style>
</head>
<body>
  <div class="stage" data-screen-label="Leaderboard Poster">
    <div class="glow l"></div>
    <div class="glow r"></div>

    <img class="sym s-coin"   src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/coin.png" alt="" />
    <img class="sym s-gold"   src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/goldcoin.png" alt="" />
    <img class="sym s-silver" src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/silvercoin.png" alt="" />
    <img class="sym s-bronze" src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/bronzecoin.png" alt="" />
    <img class="sym s-gift"   src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/giftbox.png" alt="" />
    <img class="sym s-three"  src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/threecoins.png" alt="" />

    <img class="raccoon" src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/rainbet_raccoon.png" alt="Rainbet mascot" />

    <div class="content">
      <div class="h1">
        <span class="row row1"><span class="gradb">$6,000</span> <span class="silv">MONTHLY</span></span>
        <span class="row row2 gradb">LEADERBOARD</span>
      </div>
      <div class="sub">3.5% RAKEBACK &middot; RANK-UP REWARDS <span class="bar">|</span> $10 BACK FOR EVERY $10,000 WAGERED</div>
      <div class="foot">
        <img class="flogo" src="https://raw.githubusercontent.com/aspct49-dev/tegens/main/public/TGN.webp" alt="TEGENS" />
        <span class="arrows"><i></i><i></i><i></i></span>
        <span class="code">USE CODE: <b>TEGENS</b></span>
      </div>
    </div>
  </div>
</body>
</html>
